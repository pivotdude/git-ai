name: Publish NPM

on:
  release:
    types:
      - published

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"

          if [ -z "$PKG_VERSION" ] || [ "$PKG_VERSION" = "undefined" ]; then
            echo "package.json.version is missing"
            exit 1
          fi

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag ($RELEASE_TAG) does not match package.json version ($PKG_VERSION)."
            echo "Expected release tag: $EXPECTED_TAG"
            exit 1
          fi

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Audit private artifacts
        run: bun run audit:private-artifacts

      - name: Dry-run npm pack
        run: npm pack --dry-run

      - name: Publish to npm (latest)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag latest
