name: CI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to verify"
        required: false
        default: "main"
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Audit private artifacts
        run: bun run audit:private-artifacts
